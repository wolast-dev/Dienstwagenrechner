<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Test</title>
<style>
body{background:#111;color:#fff;font-family:sans-serif;padding:20px;}
button{background:#c9a84c;color:#000;padding:12px 20px;border:none;border-radius:8px;font-size:16px;cursor:pointer;margin:8px;}
#result{margin-top:20px;padding:12px;background:#1a1a2e;border-radius:8px;font-size:14px;}
</style>
</head>
<body>
<h2>JavaScript Test</h2>
<button onclick="test1()">Test onclick</button>
<button id="btn2">Test addEventListener</button>
<div id="result">Noch kein Klick...</div>
<script>
function test1(){
  document.getElementById('result').textContent='onclick funktioniert! Zeit: '+new Date().toLocaleTimeString();
}
document.getElementById('btn2').addEventListener('click',function(){
  document.getElementById('result').textContent='addEventListener funktioniert! Zeit: '+new Date().toLocaleTimeString();
});
</script>
</body>
</html>
